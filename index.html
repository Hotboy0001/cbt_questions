<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDARD HEIGHT INTERNATIONAL SCHOOL - CBT PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d47a1;
            --secondary-color: #1565c0;
            --light-bg: #f5f7fa;
            --border-color: #cfd8dc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--light-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { font-size: 1.8rem; letter-spacing: 1px; }
        header h2 { font-size: 1.1rem; color: #ffeb3b; font-weight: 400; margin-top: 5px; }

        .login-container {
            max-width: 500px;
            width: 90%;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary-color);
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.15);
        }

        .btn-start {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-start:hover { background: var(--secondary-color); }
        .error-message { color: #c62828; font-size: 0.9rem; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>STANDARD HEIGHT INTERNATIONAL SCHOOL</h1>
        <h2>CENTRAL CBT EXAMINATION PORTAL</h2>
    </header>

    <div class="login-container">
        <h2>Student Login</h2>
        <div class="error-message" id="error-msg">Please fill out all required fields.</div>
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="student-name" placeholder="Enter your full name" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>Registration Number</label>
            <input type="text" id="reg-number" placeholder="Enter your Reg Number" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Class</label>
            <select id="class-select">
                <option value="">Select your class</option>
                <option value="SS 1">SS 1</option>
                <option value="SS 2">SS 2</option>
            </select>
        </div>

        <div class="form-group" id="dept-group" style="display: none;">
            <label>Department</label>
            <select id="dept-select">
                <option value="">Select your department</option>
                <option value="Science" class="dept-opt sci">Science</option>
                <option value="Commercial" class="dept-opt com">Commercial</option>
                <option value="Arts" class="dept-opt art">Arts</option>
            </select>
        </div>

        <div class="form-group" id="group-group" style="display: none;">
            <label>Examination Group</label>
            <select id="group-select">
                <option value="">Select your subject group</option>
                <!-- Options populated dynamically -->
            </select>
        </div>

        <button class="btn-start" onclick="startExam()">Enter Examination <i class="fas fa-arrow-right"></i></button>
    </div>

    <script>
        // Data Mapping based on the user's requirements - DAY 3
        const curriculum = {
            "SS 1": {
                "Science": [
                    { title: "Mathematics, Digital Tech & Livestock", file: "MATHS, D.TECH & LVSTCK.html" }
                ],
                "Commercial": [
                    { title: "Mathematics, Digital Tech & Fashion", file: "MATHS, D.TECH & FASHION SS 1.html" }
                ]
            },
            "SS 2": {
                "Science": [
                    { title: "Mathematics, Digital Tech & Livestock", file: "MATHS, D.TECH & LVSTCK-1.html" }
                ],
                "Arts": [
                    { title: "Mathematics, Digital Tech & Beauty", file: "MATHS, D.TECH & BEAUTY.html" }
                ]
            }
        };

        const classSelect = document.getElementById('class-select');
        const deptSelect = document.getElementById('dept-select');
        const groupSelect = document.getElementById('group-select');
        const deptGroup = document.getElementById('dept-group');
        const groupGroup = document.getElementById('group-group');

        classSelect.addEventListener('change', () => {
            const cls = classSelect.value;
            deptSelect.value = '';
            groupSelect.innerHTML = '<option value="">Select your subject group</option>';
            groupGroup.style.display = 'none';

            if (cls === "") {
                deptGroup.style.display = 'none';
                return;
            }

            deptGroup.style.display = 'block';

            // Filter departments
            document.querySelectorAll('.dept-opt').forEach(opt => opt.style.display = 'none');
            if (cls === "SS 1") {
                document.querySelector('.dept-opt.sci').style.display = 'block';
                document.querySelector('.dept-opt.com').style.display = 'block';
            } else if (cls === "SS 2") {
                document.querySelector('.dept-opt.sci').style.display = 'block';
                document.querySelector('.dept-opt.art').style.display = 'block';
            }
        });

        deptSelect.addEventListener('change', () => {
            const cls = classSelect.value;
            const dept = deptSelect.value;
            
            groupSelect.innerHTML = '<option value="">Select your subject group</option>';
            
            if (cls && dept && curriculum[cls] && curriculum[cls][dept]) {
                curriculum[cls][dept].forEach(group => {
                    const opt = document.createElement('option');
                    opt.value = group.file;
                    opt.textContent = group.title;
                    groupSelect.appendChild(opt);
                });
                groupGroup.style.display = 'block';
            } else {
                groupGroup.style.display = 'none';
            }
        });

        function startExam() {
            const name = document.getElementById('student-name').value.trim();
            const regNum = document.getElementById('reg-number').value.trim();
            const cls = document.getElementById('class-select').value;
            const dept = document.getElementById('dept-select').value;
            const targetFile = document.getElementById('group-select').value;
            const groupTitle = document.getElementById('group-select').options[document.getElementById('group-select').selectedIndex]?.text;

            if (!name || !regNum || !cls || !dept || !targetFile) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            // Save to localStorage
            const sessionData = {
                name: name,
                regNum: regNum,
                classLevel: cls,
                department: dept,
                subjectGroup: groupTitle,
                timestamp: new Date().getTime()
            };
            
            localStorage.setItem('authSession', JSON.stringify(sessionData));

            // Redirect to the exam file
            window.location.href = encodeURI(targetFile);
        }
    </script>
</body>
</html>
